<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrito - YOLUVAMI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* BASE */
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#f5f5f5;
  padding-bottom:180px; /* 🔥 MÁS ESPACIO */
}

/* CONTENEDOR */
.wrapper{
  max-width:900px;
  margin:auto;
  background:#fff;
  min-height:100vh;
}

/* HEADER */
header{
  padding:20px;
  text-align:center;
  font-weight:600;
  border-bottom:1px solid #eee;
}

/* LISTA */
.container{
  padding:20px;
}

/* ITEM */
.item{
  display:flex;
  gap:15px;
  padding:15px;
  border-radius:15px;
  background:#fafafa;
  margin-bottom:15px;
  align-items:center;
}

.item img{
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:12px;
}

/* INFO */
.info{
  flex:1;
}

.info h4{
  margin:0;
  font-size:15px;
}

.price{
  color:#e91e63;
  font-weight:600;
  margin-top:4px;
}

/* CONTROLES */
.controls{
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:6px;
}

.controls button{
  width:28px;
  height:28px;
  border:none;
  border-radius:8px;
  background:#eee;
  cursor:pointer;
  font-weight:bold;
}

.controls span{
  min-width:20px;
  text-align:center;
}

/* ELIMINAR */
.delete{
  font-size:12px;
  color:#888;
  cursor:pointer;
  margin-top:5px;
}

/* 🔥 CHECKOUT MEJORADO */
.checkout{
  position:fixed;
  bottom:70px; /* 🔥 SOLUCIÓN */
  left:0;
  width:100%;
  background:#fff;
  padding:15px 20px;
  border-top:1px solid #eee;
  box-shadow:0 -8px 20px rgba(0,0,0,0.08);
  backdrop-filter: blur(10px);
  z-index:999;
}

.checkout-box{
  max-width:900px;
  margin:auto;
}

/* TOTAL */
.total{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:600;
  font-size:16px;
  margin-bottom:10px;
}

/* BOTÓN PRO */
.buy{
  width:100%;
  padding:16px;
  border:none;
  background:linear-gradient(45deg,#e91e63,#ff4d88);
  color:#fff;
  border-radius:14px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.buy:hover{
  opacity:0.9;
}

/* NAV */
.bottomNav{
  position:fixed;
  bottom:0;
  width:100%;
  height:65px;
  background:#fff;
  display:flex;
  border-top:1px solid #eee;
  z-index:1000;
}

.navItem{
  flex:1;
  text-align:center;
  padding:10px;
  text-decoration:none;
  color:#999;
  position:relative;
}

.navItem.active{
  color:#e91e63;
}

/* BADGE */
.badge{
  position:absolute;
  top:5px;
  right:25px;
  background:#e91e63;
  color:#fff;
  border-radius:50%;
  font-size:10px;
  padding:2px 6px;
}

/* VACÍO */
.empty{
  text-align:center;
  margin-top:60px;
  color:#777;
}

/* 📱 MOBILE */
@media(max-width:768px){

  .wrapper{
    max-width:100%;
  }

  .container{
    padding:15px;
  }

  .item{
    gap:10px;
  }

  .item img{
    width:75px;
    height:75px;
  }

}

</style>
</head>

<body>

<div class="wrapper">

<header>Tu carrito</header>

<div class="container" id="lista"></div>

</div>

<!-- CHECKOUT -->
<div class="checkout">
  <div class="checkout-box">

    <div class="total">
      <span>Total</span>
      <span id="total">C$0</span>
    </div>

    <button class="buy" onclick="finalizar()">Finalizar compra</button>

  </div>
</div>

<!-- NAV -->
<nav class="bottomNav">
  <a href="index.html" class="navItem">Inicio</a>
  <a href="carrito.html" class="navItem active">
    Carrito
    <span class="badge" id="count">0</span>
  </a>
</nav>

<script>

function render(){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  const lista = document.getElementById("lista");
  const totalHTML = document.getElementById("total");

  lista.innerHTML = "";

  if(cart.length === 0){
    lista.innerHTML = `<div class="empty">Tu carrito está vacío 🛍️</div>`;
  }

  let total = 0;

  cart.forEach((p,i)=>{
    total += p.price * p.cantidad;

    lista.innerHTML += `
    <div class="item">
      <img src="${p.img}">
      <div class="info">
        <h4>${p.name}</h4>
        <div class="price">C$${p.price}</div>

        <div class="controls">
          <button onclick="cambiar(${i},-1)">-</button>
          <span>${p.cantidad}</span>
          <button onclick="cambiar(${i},1)">+</button>
        </div>

        <div class="delete" onclick="eliminar(${i})">Eliminar</div>
      </div>
    </div>
    `;
  });

  totalHTML.innerText = "C$" + total;
}

function cambiar(i, cambio){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart[i].cantidad += cambio;

  if(cart[i].cantidad <= 0){
    cart.splice(i,1);
  }

  localStorage.setItem("cart", JSON.stringify(cart));
  render();
  updateCount();
}

function eliminar(i){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.splice(i,1);
  localStorage.setItem("cart", JSON.stringify(cart));
  render();
  updateCount();
}

function updateCount(){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let total = cart.reduce((acc,p)=> acc + p.cantidad,0);
  document.getElementById("count").innerText = total;
}

/* 🔥 FINALIZAR COMPRA PRO */
function finalizar(){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  if(cart.length === 0){
    alert("Tu carrito está vacío");
    return;
  }

  alert("Compra realizada con éxito 🎉");

  localStorage.removeItem("cart");
  render();
  updateCount();
}

render();
updateCount();

</script>

</body>
</html>
